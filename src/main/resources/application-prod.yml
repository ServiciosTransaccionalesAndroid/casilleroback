spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/locker_db}
    username: ${DATABASE_USERNAME:locker_user}
    password: ${DATABASE_PASSWORD:locker_pass}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    validate-on-migrate: false
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:quasar1035@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50
      min-spare: 10

logging:
  level:
    com.servientrega.locker: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
